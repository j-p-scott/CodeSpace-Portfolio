  <!-- Register Section -->

<h1 class="text-center">REGISTER</h1>
  <div class="container-fluid mt-4 px-5">
  <div class="row align-items-start">

    <br>

<div class="container mt-5" style="max-width: 600px;">
  <form>
    <div class="mb-3 text-light">
      <label for="name" class="form-label">Name:</label>
      <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
    </div>
    <br>

    <div class="mb-3 text-light">
      <label for="email" class="form-label">Email:</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
    </div>


  <br>
  <!-- Message Box -->

    <div class="mb-3 text-start text-light">
      <label for="message" class="form-label">Message:</label>
      <textarea class="form-control" id="message" name="message" rows="6" placeholder="Enter your message" required></textarea>
    </div>

    <!-- Submit Button -->

    <div class="d-flex justify-content-center">
      <button type="submit" class="btn btn-dark text-light">Submit</button>
    </div>
  </form>
</div>
